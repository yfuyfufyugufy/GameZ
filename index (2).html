<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZ</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e12;--bg2:#16161e;--bg3:#1e1e2a;--border:#2a2a38;--accent:#f5c842;--accent2:#e8453c;--text:#f0f0f0;--muted:#888;--card:#18181f}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto}
.nav-btn{padding:14px 20px;font-size:15px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.15s}
.nav-btn:hover{color:var(--text)}.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none}.page.active{display:block}
.sb-top{padding:1.5rem 1.5rem 1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sb-top h2{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-right:auto;letter-spacing:1px}
.srch{padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:200px;outline:none;background:var(--bg3);color:var(--text);font-family:'Inter',sans-serif}
.srch:focus{border-color:var(--accent)}.srch::placeholder{color:var(--muted)}
.up-btn{padding:8px 18px;border:1px solid var(--accent);border-radius:6px;background:transparent;font-size:13px;cursor:pointer;font-weight:600;color:var(--accent);font-family:'Inter',sans-serif;transition:all 0.15s;white-space:nowrap}
.up-btn:hover{background:var(--accent);color:#000}
.snd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:0 1.5rem 1rem}
.snd{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 0.8rem;cursor:pointer;text-align:center;transition:all 0.12s;position:relative}
.snd:hover{border-color:#444;background:var(--bg3);transform:translateY(-1px)}.snd.playing{border-color:var(--accent)}
.snd .si{font-size:1.6rem;margin-bottom:6px}.snd .sl{font-size:11px;font-weight:500;color:#ccc;line-height:1.3}
.snd .sd{position:absolute;top:5px;right:5px;background:none;border:none;color:#444;font-size:14px;cursor:pointer;display:none}
.snd:hover .sd{display:block}.snd .sd:hover{color:#e00}
.sb-bar{border-top:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;gap:10px;background:var(--bg2)}
.sb-bar span{font-size:12px;color:var(--muted);flex:1}
.stop-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);font-size:12px;cursor:pointer;color:var(--text);font-family:'Inter',sans-serif}
.no-res{text-align:center;color:var(--muted);font-size:13px;padding:2rem;grid-column:1/-1}
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-start;justify-content:center;padding-top:80px}
.mbg.open{display:flex}
.modal{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:1.5rem;width:340px;max-width:95vw}
.modal h3{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:1rem;color:var(--accent);letter-spacing:1px}
.modal label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;margin-top:8px;text-transform:uppercase;letter-spacing:0.5px}
.modal input[type=text],.modal input[type=password]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text);margin-bottom:6px}
.modal input:focus{border-color:var(--accent)}
.mrow{display:flex;gap:8px;margin-top:14px}
.mrow button{flex:1;padding:9px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text)}
.mrow .mp{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}.mrow .mp:hover{background:#e6b800}
.merr{font-size:11px;color:var(--accent);margin-bottom:6px;display:none}
.tabs2{display:flex;gap:4px;margin-bottom:1rem}
.tab2{flex:1;padding:7px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);font-size:12px;cursor:pointer;text-align:center;font-family:'Inter',sans-serif;color:var(--muted)}
.tab2.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.panel2{display:none}.panel2.active{display:block}
.xbtn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}.xbtn:hover{color:var(--text)}
.rbtn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text)}
.rbtn.rec{background:#3a1010;border-color:#f55;color:#f55}
.me-wrap{padding:1.5rem;max-width:1100px}
.me-hero{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.me-money{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:var(--accent)}
.me-per{font-size:12px;color:var(--muted);margin-top:2px}
.click-btn{padding:12px 28px;border:none;border-radius:8px;background:var(--accent);color:#000;font-size:16px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;margin-left:auto;transition:all 0.1s}
.click-btn:hover{background:#e6b800;transform:scale(1.03)}.click-btn:active{transform:scale(0.95)}
.prest-btn{padding:9px 18px;border:1px solid var(--accent2);border-radius:8px;background:transparent;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--accent2)}
.me-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat .sv{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.stat .sl2{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.me-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.me-tab{padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--muted);transition:all 0.15s}
.me-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.me-section h3{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);padding-bottom:6px}
.biz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1rem}
.biz{border:1px solid var(--border);border-radius:8px;padding:0.8rem;background:var(--card)}
.biz-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.biz-icon{font-size:1.2rem}.biz-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.2}.biz-lvl{font-size:10px;color:var(--muted)}
.biz-bar-bg{background:var(--bg3);border-radius:3px;height:3px;margin-bottom:6px;overflow:hidden}
.biz-bar{background:var(--accent);height:3px;border-radius:3px}
.biz-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.biz-income{font-size:10px;color:var(--muted)}
.buy-btn{padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg3);font-size:10px;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;color:var(--text);white-space:nowrap}
.buy-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.buy-btn:disabled{color:#444;cursor:default}
.upg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.upg{border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--card);display:flex;align-items:center;gap:10px}
.upg-info{flex:1;min-width:0}.upg-name{font-size:12px;font-weight:600;color:var(--text)}.upg-desc{font-size:10px;color:var(--muted);margin-top:2px}
.upg-btn{padding:5px 11px;border:1px solid var(--border);border-radius:5px;background:var(--bg3);font-size:10px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;color:var(--text);flex-shrink:0}
.upg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.upg-btn.owned{color:#3a3;border-color:#1a3a1a;cursor:default}
.me-log{font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;line-height:1.8}
.games-top{padding:1.5rem 1.5rem 1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.games-top h2{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;margin-right:auto}
.game-cats{display:flex;gap:6px;padding:0 1.5rem 1rem;flex-wrap:wrap}
.game-cat{padding:5px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--muted);transition:all 0.15s}
.game-cat.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:0 1.5rem 1.5rem}
.game-card{border:1px solid var(--border);border-radius:8px;padding:1.2rem 1rem;cursor:pointer;text-align:center;transition:all 0.12s;background:var(--card)}
.game-card:hover{border-color:var(--accent);transform:translateY(-2px)}.game-card.featured{border-color:var(--accent);background:rgba(245,200,66,0.07)}
.game-card .gc-icon{font-size:2rem;margin-bottom:8px}.game-card .gc-name{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text)}.game-card .gc-cat{font-size:10px;color:var(--muted)}
.gmbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:50;align-items:center;justify-content:center}
.gmbg.open{display:flex}
.gm{background:var(--bg2);border-radius:12px;border:1px solid var(--border);width:min(720px,98vw);height:min(620px,96vh);display:flex;flex-direction:column;overflow:hidden}
.gm-top{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;background:var(--bg2)}
.gm-top h3{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;flex:1;letter-spacing:0.5px;color:var(--accent)}
.gc-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}.gc-btn:hover{color:var(--text)}
.gframe{flex:1;width:100%;border:none;background:#000}
</style>
</head>
<body>
<div class="nav">
  <button class="nav-btn active" onclick="showPage('sounds',this)">🔊 Sounds</button>
  <button class="nav-btn" onclick="showPage('empire',this)">💰 Money Empire</button>
  <button class="nav-btn" onclick="showPage('games',this)">🎮 Games</button>
</div>
<div class="page active" id="page-sounds">
  <div class="sb-top">
    <h2 id="snd-count">SOUNDS</h2>
    <input class="srch" type="text" placeholder="Search sounds..." oninput="filterSounds(this.value)">
    <button class="up-btn" onclick="openModal()">+ Upload</button>
  </div>
  <div class="snd-grid" id="snd-grid"></div>
  <div class="sb-bar"><span id="now-playing">Nothing playing</span><button class="stop-btn" onclick="stopAll()">■ Stop</button></div>
</div>
<div class="page" id="page-empire">
  <div class="me-wrap">
    <div class="me-hero">
      <div><div class="me-money" id="g-money">$0.00</div><div class="me-per" id="g-per">$0.00/sec</div></div>
      <button class="click-btn" onclick="clickMoney()">💰 CLICK</button>
      <button class="prest-btn" id="prest-btn" style="display:none" onclick="prestige()">⭐ PRESTIGE</button>
    </div>
    <div class="me-stats">
      <div class="stat"><div class="sv" id="g-total">$0</div><div class="sl2">Total Earned</div></div>
      <div class="stat"><div class="sv" id="g-clicks">0</div><div class="sl2">Clicks</div></div>
      <div class="stat"><div class="sv" id="g-prestige">0</div><div class="sl2">Prestiges</div></div>
      <div class="stat"><div class="sv" id="g-mult">x1</div><div class="sl2">Bonus</div></div>
    </div>
    <div class="me-tabs">
      <button class="me-tab active" onclick="showEmpireTab('businesses',this)">Businesses</button>
      <button class="me-tab" onclick="showEmpireTab('upgrades',this)">Upgrades</button>
      <button class="me-tab" onclick="showEmpireTab('investments',this)">Investments</button>
      <button class="me-tab" onclick="showEmpireTab('special',this)">Special</button>
    </div>
    <div id="empire-tab-businesses" class="me-section"><h3>Businesses</h3><div class="biz-grid" id="biz-grid"></div></div>
    <div id="empire-tab-upgrades" class="me-section" style="display:none"><h3>Upgrades</h3><div class="upg-grid" id="upg-grid"></div></div>
    <div id="empire-tab-investments" class="me-section" style="display:none"><h3>Investments</h3><div class="upg-grid" id="inv-grid"></div></div>
    <div id="empire-tab-special" class="me-section" style="display:none"><h3>Special</h3><div class="upg-grid" id="spec-grid"></div></div>
    <div class="me-log" id="me-log"></div>
  </div>
</div>
<div class="page" id="page-games">
  <div class="games-top"><h2>GAMES</h2><input class="srch" type="text" placeholder="Search games..." oninput="filterGames(this.value)" style="width:200px"></div>
  <div class="game-cats" id="game-cats"></div>
  <div class="games-grid" id="games-grid"></div>
</div>
<div class="mbg" id="mbg" onclick="bgClick(event)">
  <div class="modal">
    <button class="xbtn" onclick="closeModal()">×</button>
    <h3>UPLOAD SOUND</h3>
    <div id="pw-step">
      <label>Password</label>
      <input type="password" id="pw-in" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
      <div class="merr" id="pw-err">Wrong password</div>
      <div class="mrow"><button onclick="closeModal()">Cancel</button><button class="mp" onclick="checkPw()">Continue →</button></div>
    </div>
    <div id="up-step" style="display:none">
      <div class="tabs2">
        <button class="tab2 active" onclick="swTab('file',this)">File</button>
        <button class="tab2" onclick="swTab('record',this)">Record</button>
      </div>
      <div class="panel2 active" id="tab-file">
        <label>Sound name</label><input type="text" id="fn" placeholder="e.g. Vine Boom">
        <label>Emoji</label><input type="text" id="fe" placeholder="e.g. 💥" maxlength="2">
        <label>Audio file (mp3, wav, ogg)</label>
        <input type="file" id="fi" accept="audio/*" style="font-size:12px;width:100%;margin-bottom:8px;color:var(--text)">
        <div class="merr" id="ferr">Please fill all fields</div>
        <div class="mrow"><button onclick="closeModal()">Cancel</button><button class="mp" onclick="addFile()">Add Sound</button></div>
      </div>
      <div class="panel2" id="tab-record">
        <label>Sound name</label><input type="text" id="rn" placeholder="e.g. My scream">
        <label>Emoji</label><input type="text" id="re" placeholder="e.g. 🎤" maxlength="2">
        <div style="display:flex;align-items:center;gap:8px;margin:8px 0">
          <button class="rbtn" id="rbtn" onclick="toggleRec()">⏺ Record</button>
          <span id="rst" style="font-size:12px;color:var(--muted)">Not recording</span>
        </div>
        <div class="merr" id="rerr">Please record something first</div>
        <div class="mrow"><button onclick="closeModal()">Cancel</button><button class="mp" onclick="addRec()">Add Sound</button></div>
      </div>
    </div>
  </div>
</div>
<div class="gmbg" id="gmbg">
  <div class="gm">
    <div class="gm-top"><h3 id="gm-title">Game</h3><button class="gc-btn" onclick="closeGame()">✕</button></div>
    <iframe class="gframe" id="gframe" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>
<script>
const PASS="nechceb5fb75f7";
const SK="gamez_session";
let sid=sessionStorage.getItem(SK);
if(!sid){sid=Math.random().toString(36).slice(2);sessionStorage.setItem(SK,sid);}

const builtins=[
  {name:"Aaaaaaah",emoji:"😱",file:"Aaaaaaah.mp3",builtin:true},
  {name:"Bruh",emoji:"😐",file:"Bruh.mp3",builtin:true},
  {name:"Faaahhhhh",emoji:"😤",file:"Faaahhhhh.mp3",builtin:true},
  {name:"I Woke Up In A New Bugatti",emoji:"🚗",file:"I woke up in a new Bugatti.mp3",builtin:true},
  {name:"One Two Buckle My Shoe",emoji:"👟",file:"One two buckle my shoe.mp3",builtin:true},
  {name:"UWU",emoji:"🥺",file:"UWU.mp3",builtin:true},
  {name:"Womp Womp",emoji:"😢",file:"Womp Womp.mp3",builtin:true},
  {name:"Your Phone Lingin",emoji:"📱",file:"Your phone lingin.mp3",builtin:true},
  {name:"Italian Brainrot Ringtone",emoji:"🍕",file:"italian brainrot ringtone.mp3",builtin:true},
  {name:"Please Speed I Need This",emoji:"⚡",file:"please speed i need this.mp3",builtin:true},
];

// CLOUD SOUNDS
let cloudSounds=[];
async function sha1(str){
  const buf=await crypto.subtle.digest("SHA-1",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function fetchCloudSounds(){
  try{
    const res=await fetch("https://res.cloudinary.com/dqdr2txt8/video/list/gamez.json");
    const data=await res.json();
    if(data.resources){
      cloudSounds=data.resources.map(r=>{
        const ctx=r.context&&r.context.custom;
        return{
          id:r.public_id,
          name:ctx&&ctx.name?decodeURIComponent(ctx.name):r.public_id.replace("gamez/",""),
          emoji:ctx&&ctx.emoji?decodeURIComponent(ctx.emoji):"🔊",
          url:"https://res.cloudinary.com/dqdr2txt8/video/upload/"+r.public_id+"."+r.format,
          sessionId:ctx&&ctx.sessionId?ctx.sessionId:"",
          builtin:false
        };
      });
    }
  }catch(e){cloudSounds=[];}
}
function allSounds(){return[...builtins,...cloudSounds];}
async function saveSounds(s){
  cloudSounds.push(s);renderSounds();
  const m=JSON.parse(localStorage.getItem("gamez_my")||"[]");
  m.push({id:s.id,sid:sid});
  localStorage.setItem("gamez_my",JSON.stringify(m));
}
async function deleteSound(id){
  cloudSounds=cloudSounds.filter(s=>s.id!==id);renderSounds();
  try{
    const ts=Math.floor(Date.now()/1000);
    const sig=await sha1("public_id="+id+"&timestamp="+ts+"a2r8s-B5EJkzYkNL6Cj2i0AZDtw");
    const fd=new FormData();
    fd.append("public_id",id);fd.append("api_key","887813763833587");
    fd.append("timestamp",ts);fd.append("signature",sig);
    await fetch("https://api.cloudinary.com/v1_1/dqdr2txt8/video/destroy",{method:"POST",body:fd});
  }catch(e){}
}

let curAudio=null,curBtn=null,recMR=null,recChunks=[],recUrl=null;

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");btn.classList.add("active");
}
function renderSounds(q){
  q=q||"";
  const myUploads=JSON.parse(localStorage.getItem("gamez_my")||"[]");
  const myIds=myUploads.filter(m=>m.sid===sid).map(m=>m.id);
  const all=allSounds().filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById("snd-count").textContent=allSounds().length+" SOUNDS";
  const grid=document.getElementById("snd-grid");grid.innerHTML="";
  if(!all.length){grid.innerHTML='<div class="no-res">No sounds found</div>';return;}
  all.forEach(function(s){
    const d=document.createElement("div");d.className="snd";
    d.innerHTML='<div class="si">'+(s.emoji||"🔊")+'</div><div class="sl">'+s.name+'</div>';
    d.onclick=function(e){if(e.target.classList.contains("sd"))return;playSound(s,d);};
    if(!s.builtin&&(s.sessionId===sid||myIds.includes(s.id))){
      const x=document.createElement("button");x.className="sd";x.textContent="×";x.title="Delete";
      x.onclick=function(e){e.stopPropagation();deleteSound(s.id);};
      d.appendChild(x);
    }
    grid.appendChild(d);
  });
}
function filterSounds(q){renderSounds(q);}
function playSound(s,btn){
  stopAll();const a=new Audio(s.url||s.file);curAudio=a;curBtn=btn;
  btn.classList.add("playing");document.getElementById("now-playing").textContent="▶ "+s.name;
  a.play().catch(function(){});
  a.onended=function(){btn.classList.remove("playing");document.getElementById("now-playing").textContent="Nothing playing";curAudio=null;curBtn=null;};
}
function stopAll(){
  if(curAudio){curAudio.pause();curAudio.currentTime=0;curAudio=null;}
  if(curBtn){curBtn.classList.remove("playing");curBtn=null;}

function incomePerSec(){
  let total=0,allMult=1,invMult=1,extraMult=1,taxMult=1;
  if(G.upgrades.includes("all4"))allMult=5;else if(G.upgrades.includes("all3"))allMult=3;else if(G.upgrades.includes("all2"))allMult=2;
  [{id:"timemachine",v:11},{id:"sovereign",v:6},{id:"vc",v:3},{id:"hedgefund",v:2},{id:"realestate",v:1.5},{id:"crypto",v:1.25},{id:"stocks",v:1.1}].forEach(function(x){if(G.upgrades.includes(x.id))invMult*=x.v;});
  if(G.upgrades.includes("doubler"))extraMult*=2;if(G.upgrades.includes("tripler"))extraMult*=3;
  if(G.upgrades.includes("tax3"))taxMult=1.5;else if(G.upgrades.includes("tax2"))taxMult=1.25;else if(G.upgrades.includes("tax"))taxMult=1.1;
  G.businesses.forEach(function(s){
    if(s.count===0)return;const d=bizDef(s.id);let inc=d.inc*s.count;
    UPG_DEF.filter(u=>u.type==="biz"&&u.biz===s.id).forEach(function(u){if(G.upgrades.includes(u.id))inc*=u.val;});
    total+=inc;
  });
  const prestBoost=G.prestige>0?1+G.prestige*0.5:1;

  if(G.upgrades.includes("pr3"))specBoost+=G.prestige*0.25;else if(G.upgrades.includes("pr2"))specBoost+=G.prestige*0.1;else if(G.upgrades.includes("pr1"))specBoost+=G.prestige*0.05;

}

  {name:"Flappy Bird",cat:"Action",emoji:"🐦",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#70c5ce;display:flex;align-items:center;justify-content:center;height:100vh}canvas{cursor:pointer;border-radius:4px}</style></head><body><canvas id="c" width="400" height="500"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d'),W=400,H=500;let bird={x:100,y:250,vy:0},pipes=[],score=0,best=0,alive=false,frame=0;function jump(){if(!alive){alive=true;bird={x:100,y:250,vy:0};pipes=[];score=0;frame=0;}bird.vy=-8;}c.addEventListener('click',jump);document.addEventListener('keydown',e=>{if(e.code==='Space')jump();});function loop(){if(alive){bird.vy+=0.5;bird.y+=bird.vy;frame++;if(frame%90===0){const gap=120,top=60+Math.random()*(H-gap-120);pipes.push({x:W,top,gap});}pipes.forEach(p=>p.x-=3);pipes=pipes.filter(p=>{if(p.x+50<0){score++;return false;}if(bird.x+15>p.x&&bird.x-15<p.x+50&&(bird.y-15<p.top||bird.y+15>p.top+p.gap)){alive=false;best=Math.max(best,score);}return true;});if(bird.y>H-30||bird.y<0)alive=false;}ctx.fillStyle='#70c5ce';ctx.fillRect(0,0,W,H);ctx.fillStyle='#5db33e';pipes.forEach(p=>{ctx.fillRect(p.x,0,50,p.top);ctx.fillRect(p.x,p.top+p.gap,50,H);});ctx.fillStyle='#f0d060';ctx.beginPath();ctx.ellipse(bird.x,bird.y,15,12,bird.vy*0.04,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(0,H-30,W,30);ctx.fillStyle='#fff';ctx.font='bold 20px system-ui';ctx.textAlign='center';if(alive)ctx.fillText(score,W/2,40);else{ctx.fillText('Click or Space to start',W/2,H/2-10);ctx.font='14px system-ui';ctx.fillText('Best: '+best,W/2,H/2+20);}requestAnimationFrame(loop);}loop();<\/script></body></html>`},
  {name:"2048",cat:"Puzzle",emoji:"🔢",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#faf8ef;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px}h1{font-size:24px;color:#776e65;margin-bottom:8px}#score{font-size:14px;color:#776e65;margin-bottom:16px}#grid{display:grid;grid-template-columns:repeat(4,80px);gap:8px;background:#bbada0;padding:8px;border-radius:8px}.cell{width:80px;height:80px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:#cdc1b4;color:#776e65}.c2{background:#eee4da}.c4{background:#ede0c8}.c8{background:#f2b179;color:#fff}.c16{background:#f59563;color:#fff}.c32{background:#f67c5f;color:#fff}.c64{background:#f65e3b;color:#fff}.c128{background:#edcf72;color:#fff;font-size:16px}.c256{background:#edcc61;color:#fff;font-size:16px}.c512{background:#edc850;color:#fff;font-size:16px}.c1024{background:#edc53f;color:#fff;font-size:14px}.c2048{background:#edc22e;color:#fff;font-size:14px}</style></head><body><h1>2048</h1><div id="score">Score: <span id="sc">0</span></div><div id="grid"></div><script>let board=Array(16).fill(0),score=0;function rnd(){const e=board.map((v,i)=>v===0?i:-1).filter(i=>i>=0);if(!e.length)return;board[e[Math.floor(Math.random()*e.length)]]=Math.random()<0.9?2:4;}function render(){const g=document.getElementById('grid');g.innerHTML='';board.forEach(v=>{const d=document.createElement('div');d.className='cell'+(v?' c'+v:'');d.textContent=v||'';g.appendChild(d);});document.getElementById('sc').textContent=score;}function slide(row){const f=row.filter(v=>v);let res=[],skip=false;for(let i=0;i<f.length;i++){if(!skip&&i+1<f.length&&f[i]===f[i+1]){res.push(f[i]*2);score+=f[i]*2;skip=true;}else if(!skip){res.push(f[i]);skip=false;}else skip=false;}while(res.length<4)res.push(0);return res;}function move(dir){let changed=false,b=[...board];if(dir==='l'){for(let r=0;r<4;r++){const row=slide(b.slice(r*4,r*4+4));row.forEach((v,i)=>{if(b[r*4+i]!==v)changed=true;b[r*4+i]=v;});}}else if(dir==='r'){for(let r=0;r<4;r++){const row=slide([...b.slice(r*4,r*4+4)].reverse()).reverse();row.forEach((v,i)=>{if(b[r*4+i]!==v)changed=true;b[r*4+i]=v;});}}else if(dir==='u'){for(let c=0;c<4;c++){const col=slide([b[c],b[c+4],b[c+8],b[c+12]]);[0,4,8,12].forEach((r,i)=>{if(b[r+c]!==col[i])changed=true;b[r+c]=col[i];});}}else if(dir==='d'){for(let c=0;c<4;c++){const col=slide([b[c+12],b[c+8],b[c+4],b[c]]);[12,8,4,0].forEach((r,i)=>{if(b[r+c]!==col[i])changed=true;b[r+c]=col[i];});}}if(changed){board=b;rnd();render();}}document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move('l');else if(e.key==='ArrowRight')move('r');else if(e.key==='ArrowUp')move('u');else if(e.key==='ArrowDown')move('d');});rnd();rnd();render();<\/script></body></html>`},
  {name:"Space Invaders",cat:"Action",emoji:"👾",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace}#ui{color:#0f0;font-size:14px;margin-bottom:8px}</style></head><body><div id="ui">Score: <span id="sc">0</span> | Lives: <span id="lv">3</span></div><canvas id="c" width="480" height="400"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d'),W=480,H=400;let ship={x:240,y:370,w:30,h:20},bullets=[],aliens=[],alienDir=1,score=0,lives=3,frame=0;const keys={};document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();if(bullets.length<5)bullets.push({x:ship.x,y:ship.y-10,r:4});}});document.addEventListener('keyup',e=>keys[e.key]=false);function initAliens(){aliens=[];for(let r=0;r<4;r++)for(let c2=0;c2<10;c2++)aliens.push({x:50+c2*38,y:40+r*36,w:24,h:18,alive:true,r:r});}initAliens();const colors=['#ff4444','#ff8800','#ffff00','#44ff88'];function loop(){if(keys['ArrowLeft'])ship.x=Math.max(15,ship.x-5);if(keys['ArrowRight'])ship.x=Math.min(W-15,ship.x+5);bullets.forEach(b=>b.y-=7);bullets=bullets.filter(b=>b.y>0);frame++;const alive=aliens.filter(a=>a.alive);if(alive.length===0)initAliens();const maxX=Math.max(...alive.map(a=>a.x+a.w/2)),minX=Math.min(...alive.map(a=>a.x-a.w/2));if(maxX>W-20||minX<20){alienDir*=-1;aliens.forEach(a=>a.y+=12);}if(frame%Math.max(10,30-score/50)===0)aliens.forEach(a=>{if(a.alive)a.x+=alienDir*3;});bullets.forEach(b=>aliens.forEach(a=>{if(!a.alive)return;if(Math.abs(b.x-a.x)<a.w/2&&Math.abs(b.y-a.y)<a.h/2){a.alive=false;b.y=-1;score+=10*(a.r+1);document.getElementById('sc').textContent=score;}}));aliens.forEach(a=>{if(a.alive&&a.y>H-60){lives--;document.getElementById('lv').textContent=lives;initAliens();}});ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0f0';ctx.beginPath();ctx.moveTo(ship.x,ship.y-ship.h/2);ctx.lineTo(ship.x-ship.w/2,ship.y+ship.h/2);ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h/2);ctx.closePath();ctx.fill();aliens.forEach(a=>{if(!a.alive)return;ctx.fillStyle=colors[a.r];ctx.fillRect(a.x-a.w/2,a.y-a.h/2,a.w,a.h);});bullets.forEach(b=>{ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(loop);}loop();<\/script></body></html>`},
  {name:"Brick Breaker",cat:"Classic",emoji:"🧱",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui}#ui{color:#fff;margin-bottom:8px;font-size:13px}</style></head><body><div id="ui">Score: <span id="sc">0</span> | Lives: <span id="lv">3</span></div><canvas id="c" width="480" height="400"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d'),W=480,H=400;let bricks=[],ball={x:240,y:300,vx:3,vy:-4,r:8},pad={x:200,y:375,w:80,h:12},score=0,lives=3,mx=240;const COLS=10,ROWS=5,BW=44,BH=18,colors=['#ff4444','#ff8800','#ffff00','#44ff44','#4488ff'];function init(){bricks=[];for(let r=0;r<ROWS;r++)for(let c2=0;c2<COLS;c2++)bricks.push({x:4+c2*(BW+2),y:40+r*(BH+4),alive:true,color:colors[r]});}c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();mx=e.clientX-rect.left;});function reset(){ball={x:240,y:300,vx:3*(Math.random()>0.5?1:-1),vy:-4,r:8};pad.x=200;}function loop(){pad.x=Math.min(W-pad.w,Math.max(0,mx-pad.w/2));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x-ball.r<0||ball.x+ball.r>W)ball.vx*=-1;if(ball.y-ball.r<0)ball.vy*=-1;if(ball.y+ball.r>pad.y&&ball.x>pad.x&&ball.x<pad.x+pad.w){ball.vy=-Math.abs(ball.vy);ball.vx+=(ball.x-(pad.x+pad.w/2))*0.05;}if(ball.y>H){lives--;document.getElementById('lv').textContent=lives;if(lives<=0){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px system-ui';ctx.textAlign='center';ctx.fillText('Game Over! Score: '+score,W/2,H/2);return;}reset();}bricks.forEach(b=>{if(!b.alive)return;if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){b.alive=false;ball.vy*=-1;score+=10;document.getElementById('sc').textContent=score;}});if(bricks.every(b=>!b.alive))init();ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);bricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,BW,BH);});ctx.fillStyle='#4488ff';ctx.beginPath();ctx.roundRect(pad.x,pad.y,pad.w,pad.h,6);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();requestAnimationFrame(loop);}init();loop();<\/script></body></html>`},
  {name:"Reaction Time",cat:"Skill",emoji:"⚡",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;cursor:pointer;transition:background 0.1s;user-select:none;background:#4a4a6a}#box{font-size:22px;font-weight:600;color:#fff;text-align:center;padding:20px}#times{margin-top:20px;font-size:13px;color:#fff;opacity:0.7;text-align:center}</style></head><body id="body"><div id="box">Click to start</div><div id="times"></div><script>let state='idle',startTime,times=[],timeout;const body=document.getElementById('body'),box=document.getElementById('box'),timesEl=document.getElementById('times');body.addEventListener('click',function(){if(state==='idle'){body.style.background='#cc4444';box.textContent='Wait for green...';state='waiting';timeout=setTimeout(function(){body.style.background='#22aa44';box.textContent='CLICK NOW!';state='ready';startTime=Date.now();},1000+Math.random()*3000);}else if(state==='waiting'){clearTimeout(timeout);body.style.background='#4a4a6a';box.textContent='Too early! Click to try again';state='idle';}else if(state==='ready'){const t=Date.now()-startTime;times.push(t);body.style.background='#4a4a6a';const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);box.textContent=t+'ms — Click to try again';timesEl.textContent='Attempts: '+times.length+' | Best: '+Math.min(...times)+'ms | Avg: '+avg+'ms';state='idle';}});<\/script></body></html>`},
  {name:"Memory Match",cat:"Puzzle",emoji:"🧠",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;padding:20px}h2{margin-bottom:10px;font-size:18px}#info{font-size:13px;color:#666;margin-bottom:14px}#grid{display:grid;grid-template-columns:repeat(4,70px);gap:8px}.card{width:70px;height:70px;background:#5b5bd6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.15s;user-select:none}.card.flipped{background:#fff;border:2px solid #5b5bd6}.card.matched{background:#e8f5e9;border:2px solid #4caf50;cursor:default}#btn{margin-top:14px;padding:8px 20px;border:none;background:#5b5bd6;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}</style></head><body><h2>Memory Match</h2><div id="info">Moves: <span id="mv">0</span> | Pairs: <span id="pr">0</span>/8</div><div id="grid"></div><button onclick="init()">New Game</button><script>const emojis=['🌟','🎈','🦊','🌈','🎵','🌸','🦋','🍕'];let cards=[],flipped=[],matched=0,moves=0,lock=false;function init(){const deck=[...emojis,...emojis].sort(()=>Math.random()-0.5);cards=deck.map((e,i)=>({id:i,emoji:e,flippedState:false,matchedState:false}));flipped=[];matched=0;moves=0;lock=false;render();}function render(){const g=document.getElementById('grid');g.innerHTML='';cards.forEach(card=>{const d=document.createElement('div');d.className='card'+(card.flippedState?' flipped':'')+(card.matchedState?' matched':'');d.textContent=card.flippedState||card.matchedState?card.emoji:'';if(!card.matchedState)d.onclick=()=>flip(card);g.appendChild(d);});}function flip(card){if(lock||card.flippedState||card.matchedState)return;card.flippedState=true;flipped.push(card);render();if(flipped.length===2){moves++;document.getElementById('mv').textContent=moves;lock=true;setTimeout(()=>{if(flipped[0].emoji===flipped[1].emoji){flipped.forEach(c=>c.matchedState=true);matched++;document.getElementById('pr').textContent=matched;}else flipped.forEach(c=>c.flippedState=false);flipped=[];lock=false;render();},700);}}init();<\/script></body></html>`},
  {name:"Math Blitz",cat:"Skill",emoji:"🧮",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px}#q{font-size:44px;font-weight:700}#tb{width:300px;height:8px;background:#eee;border-radius:4px;overflow:hidden}#tf{height:100%;background:#5b5bd6;transition:width 0.1s}#btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:260px}#btns button{padding:16px;font-size:20px;font-weight:700;border:2px solid #eee;border-radius:10px;background:#fff;cursor:pointer}#btns button.correct{background:#e8f5e9;border-color:#4caf50}#btns button.wrong{background:#ffebee;border-color:#f44336}#score{font-size:14px;color:#888}</style></head><body><div id="score">Score: <span id="sc">0</span> | Best: <span id="best">0</span></div><div id="tb"><div id="tf"></div></div><div id="q"></div><div id="btns"></div><script>let score=0,best=0,answer,timeLeft=100,timer,locked=false;function gen(){locked=false;const ops=['+','-','×'];const op=ops[Math.floor(Math.random()*3)];let a,b;if(op==='+'){a=Math.floor(Math.random()*50)+1;b=Math.floor(Math.random()*50)+1;answer=a+b;}else if(op==='-'){a=Math.floor(Math.random()*50)+20;b=Math.floor(Math.random()*a)+1;answer=a-b;}else{a=Math.floor(Math.random()*12)+1;b=Math.floor(Math.random()*12)+1;answer=a*b;}document.getElementById('q').textContent=a+' '+op+' '+b+' = ?';const wrongs=new Set();while(wrongs.size<3){const w=answer+Math.floor(Math.random()*20)-10;if(w!==answer&&w>=0)wrongs.add(w);}const opts=[answer,...wrongs].sort(()=>Math.random()-0.5);const btns=document.getElementById('btns');btns.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.textContent=o;b.onclick=()=>check(b,o);btns.appendChild(b);});timeLeft=100;}function check(btn,val){if(locked)return;locked=true;if(val===answer){btn.classList.add('correct');score++;best=Math.max(best,score);}else{btn.classList.add('wrong');score=0;timeLeft=Math.max(0,timeLeft-30);}document.getElementById('sc').textContent=score;document.getElementById('best').textContent=best;setTimeout(gen,400);}clearInterval(timer);timer=setInterval(()=>{timeLeft=Math.max(0,timeLeft-1);document.getElementById('tf').style.width=timeLeft+'%';if(timeLeft<=0){score=0;document.getElementById('sc').textContent=0;gen();}},80);gen();<\/script></body></html>`},
  {name:"Whack a Mole",cat:"Action",emoji:"🔨",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#8bc34a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}#ui{font-size:16px;font-weight:600;color:#fff;margin-bottom:16px}#grid{display:grid;grid-template-columns:repeat(3,100px);gap:12px}.hole{width:100px;height:100px;background:#5d4037;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:40px;transition:all 0.1s;border:4px solid #4a2f25;user-select:none}.hole.up{background:#795548;transform:scale(1.05)}#btn{margin-top:16px;padding:8px 24px;background:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}</style></head><body><div id="ui">Score: <span id="sc">0</span> | Time: <span id="tm">30</span>s</div><div id="grid"></div><button id="btn" onclick="startGame()">Start!</button><script>let score=0,time=30,moleTimer,countTimer,activeMole=-1,playing=false;const holes=document.getElementById('grid');for(let i=0;i<9;i++){const h=document.createElement('div');h.className='hole';h.dataset.i=i;h.textContent='🕳️';h.onclick=()=>{if(playing&&parseInt(h.dataset.i)===activeMole){score++;document.getElementById('sc').textContent=score;clearHole();setMole();}};holes.appendChild(h);}function allHoles(){return document.querySelectorAll('.hole');}function clearHole(){if(activeMole>=0){const h=allHoles()[activeMole];h.classList.remove('up');h.textContent='🕳️';activeMole=-1;}}function setMole(){clearTimeout(moleTimer);const i=Math.floor(Math.random()*9);activeMole=i;const h=allHoles()[i];h.classList.add('up');h.textContent='🐹';moleTimer=setTimeout(()=>{clearHole();if(playing)setMole();},800+Math.random()*600);}function startGame(){score=0;time=30;playing=true;document.getElementById('sc').textContent=0;document.getElementById('btn').style.display='none';setMole();countTimer=setInterval(()=>{time--;document.getElementById('tm').textContent=time;if(time<=0){playing=false;clearTimeout(moleTimer);clearHole();clearInterval(countTimer);document.getElementById('btn').style.display='';document.getElementById('btn').textContent='Play again ('+score+' pts)';}},1000);}<\/script></body></html>`},
  {name:"Dino Run",cat:"Action",emoji:"🦕",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace}#ui{font-size:14px;color:#555;margin-bottom:8px}canvas{border:2px solid #ddd;border-radius:4px}</style></head><body><div id="ui">Score: <span id="sc">0</span> | Best: <span id="best">0</span></div><canvas id="c" width="600" height="200"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d'),W=600,H=200;let dino={x:60,y:150,vy:0,onGround:true,w:30,h:40},obstacles=[],score=0,best=0,speed=5,frame=0,alive=true;function jump(){if(dino.onGround){dino.vy=-14;dino.onGround=false;}}document.addEventListener('keydown',e=>{if(e.code==='Space'||e.key==='ArrowUp'){e.preventDefault();jump();}if(!alive)restart();});c.addEventListener('click',()=>{if(!alive)restart();else jump();});function restart(){alive=true;dino.y=150;dino.vy=0;dino.onGround=true;obstacles=[];score=0;speed=5;frame=0;}function loop(){if(alive){frame++;score++;speed=5+Math.floor(score/200)*0.5;dino.vy+=0.8;dino.y+=dino.vy;if(dino.y>=150){dino.y=150;dino.vy=0;dino.onGround=true;}if(frame%Math.max(50,90-Math.floor(score/100))===0)obstacles.push({x:W,y:150,w:20+Math.random()*20,h:30+Math.random()*30});obstacles.forEach(o=>o.x-=speed);obstacles=obstacles.filter(o=>{if(o.x+o.w<0)return false;if(dino.x+dino.w-5>o.x&&dino.x<o.x+o.w-5&&dino.y+dino.h-5>o.y){alive=false;best=Math.max(best,score);document.getElementById('best').textContent=best;}return true;});document.getElementById('sc').textContent=score;}ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ddd';ctx.fillRect(0,H-10,W,10);ctx.fillStyle='#555';ctx.fillRect(dino.x,dino.y-dino.h,dino.w,dino.h);ctx.fillStyle='#e55';obstacles.forEach(o=>ctx.fillRect(o.x,o.y-o.h,o.w,o.h));if(!alive){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.textAlign='center';ctx.fillText('GAME OVER  Click or Space',W/2,H/2);}requestAnimationFrame(loop);}loop();<\/script></body></html>`},
  {name:"Number Guess",cat:"Puzzle",emoji:"🎯",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px}h2{font-size:20px;font-weight:600}#hint{font-size:15px;color:#666;height:20px}input{padding:10px 16px;font-size:18px;border:2px solid #ddd;border-radius:8px;width:160px;text-align:center;outline:none}input:focus{border-color:#5b5bd6}button{padding:10px 24px;background:#5b5bd6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px}#hist{font-size:12px;color:#aaa;text-align:center;max-width:300px}</style></head><body><h2>Guess 1-100</h2><div id="hint">Make a guess!</div><input type="number" id="inp" min="1" max="100" placeholder="Your guess"><button onclick="guess()">Guess</button><div id="hist"></div><script>let n=Math.floor(Math.random()*100)+1,attempts=0,history=[];document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')guess();});function guess(){const v=parseInt(document.getElementById('inp').value);if(isNaN(v)||v<1||v>100)return;attempts++;history.unshift(v);const hint=document.getElementById('hint');if(v===n){hint.textContent='🎉 Correct in '+attempts+'!';hint.style.color='#22aa44';setTimeout(()=>{n=Math.floor(Math.random()*100)+1;attempts=0;history=[];hint.textContent='New game!';hint.style.color='#666';document.getElementById('inp').value='';},2000);}else if(v<n){hint.textContent='📈 Too low!';hint.style.color='#e07800';}else{hint.textContent='📉 Too high!';hint.style.color='#e00';}document.getElementById('hist').textContent='Guesses: '+history.join(', ');document.getElementById('inp').value='';}<\/script></body></html>`},
  {name:"Color Match",cat:"Skill",emoji:"🎨",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}#word{font-size:48px;font-weight:700}#btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}#btns button{padding:12px 20px;border:none;border-radius:8px;cursor:pointer;color:#fff;font-size:14px;font-weight:600;min-width:80px}#score{font-size:14px;color:#888}#tb{width:300px;height:6px;background:#eee;border-radius:3px;overflow:hidden}#tf{height:100%;background:#5b5bd6;transition:width 0.1s;width:100%}</style></head><body><div id="score">Score: <span id="sc">0</span> | Best: <span id="best">0</span></div><div id="tb"><div id="tf"></div></div><p style="font-size:13px;color:#888">Click the COLOR of the text, not the word</p><div id="word">RED</div><div id="btns"></div><script>const colors={Red:'#e00',Blue:'#00f',Green:'#0a0',Yellow:'#cc0',Purple:'#90f',Orange:'#f70',Pink:'#f0a',Teal:'#0aa'};const names=Object.keys(colors);let score=0,best=0,timeLeft=100,timer;function pick(){const word=names[Math.floor(Math.random()*names.length)],color=names[Math.floor(Math.random()*names.length)];document.getElementById('word').textContent=word;document.getElementById('word').style.color=colors[color];const opts=[color,...names.filter(n=>n!==color).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);const btns=document.getElementById('btns');btns.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.style.background=colors[o];b.textContent=o;b.onclick=()=>answer(o,color);btns.appendChild(b);});}function answer(chosen,correct){if(chosen===correct){score++;document.getElementById('sc').textContent=score;best=Math.max(best,score);document.getElementById('best').textContent=best;timeLeft=Math.min(100,timeLeft+15);}else{score=0;document.getElementById('sc').textContent=0;timeLeft=Math.max(0,timeLeft-20);}pick();}clearInterval(timer);timer=setInterval(()=>{timeLeft=Math.max(0,timeLeft-1);document.getElementById('tf').style.width=timeLeft+'%';if(timeLeft<=0){score=0;document.getElementById('sc').textContent=0;timeLeft=80;}},100);pick();<\/script></body></html>`},
  {name:"Clicker Hero",cat:"Clicker",emoji:"👆",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px}#big{font-size:20px;font-weight:700}#sub{font-size:13px;color:#888}#hero{width:120px;height:120px;background:#5b5bd6;border-radius:60px;display:flex;align-items:center;justify-content:center;font-size:56px;cursor:pointer;transition:transform 0.08s;user-select:none;border:none}#hero:active{transform:scale(0.9)}#upgrades{display:flex;flex-direction:column;gap:6px;width:280px}#upgrades button{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:12px}#upgrades button:disabled{color:#ccc}</style></head><body><div id="big">⚡ 0</div><div id="sub">0/sec</div><button id="hero">🧙</button><div id="upgrades"></div><script>let power=1,perSec=0,clicks=0,upgrades=[{name:'Apprentice',emoji:'🧪',desc:'+1/sec',cost:50,pps:1,bought:false},{name:'Wizard',emoji:'🔮',desc:'+5/sec',cost:300,pps:5,bought:false},{name:'Sorcerer',emoji:'⚗️',desc:'+20/sec',cost:2000,pps:20,bought:false},{name:'Dragon',emoji:'🐉',desc:'+100/sec',cost:15000,pps:100,bought:false},{name:'God',emoji:'✨',desc:'+500/sec',cost:100000,pps:500,bought:false},{name:'Click x2',emoji:'👆',desc:'2x click',cost:100,pps:0,bought:false,cp:2},{name:'Click x5',emoji:'✋',desc:'5x click',cost:1000,pps:0,bought:false,cp:5},{name:'Click x10',emoji:'🤲',desc:'10x click',cost:20000,pps:0,bought:false,cp:10}];function renderUpgrades(){const d=document.getElementById('upgrades');d.innerHTML='';upgrades.forEach(u=>{const b=document.createElement('button');b.textContent=u.emoji+' '+u.name+' — '+u.desc+' — '+u.cost.toLocaleString();b.disabled=u.bought||clicks<u.cost;b.onclick=()=>{if(clicks>=u.cost&&!u.bought){clicks-=u.cost;u.bought=true;if(u.pps)perSec+=u.pps;if(u.cp)power*=u.cp;renderUpgrades();}};d.appendChild(b);});}document.getElementById('hero').onclick=()=>{clicks+=power;update();};setInterval(()=>{clicks+=perSec/20;update();},50);function update(){document.getElementById('big').textContent='⚡ '+Math.floor(clicks).toLocaleString();document.getElementById('sub').textContent=perSec+'/sec';renderUpgrades();}renderUpgrades();<\/script></body></html>`},
  {name:"Word Scramble",cat:"Word",emoji:"🔤",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px}#scrambled{font-size:40px;font-weight:700;letter-spacing:6px;color:#333}#hint{font-size:13px;color:#aaa}input{padding:10px 16px;font-size:18px;border:2px solid #ddd;border-radius:8px;text-align:center;outline:none;width:240px}input:focus{border-color:#5b5bd6}#msg{font-size:14px;height:18px}#score{font-size:14px;color:#888}button{padding:8px 20px;background:#5b5bd6;color:#fff;border:none;border-radius:8px;cursor:pointer}</style></head><body><div id="score">Score: <span id="sc">0</span> | Streak: <span id="str">0</span></div><div id="scrambled"></div><div id="hint"></div><input id="inp" type="text" placeholder="Unscramble it!" autocomplete="off"><div id="msg"></div><button onclick="skip()">Skip</button><script>const words=[['apple','a fruit'],['beach','sandy shore'],['cloud','in the sky'],['dance','move to music'],['eagle','a bird'],['flame','fire'],['grape','a fruit'],['happy','feeling joy'],['jungle','wild forest'],['knife','sharp tool'],['lemon','sour fruit'],['mango','tropical fruit'],['night','after sunset'],['ocean','big sea'],['piano','instrument'],['queen','royal woman'],['river','flowing water'],['smile','happy face'],['tiger','striped cat'],['water','H2O'],['yacht','fancy boat'],['zebra','striped animal']];let score=0,streak=0,current;function scramble(w){const a=w.split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('')===w?scramble(w):a.join('');}function next(){current=words[Math.floor(Math.random()*words.length)];document.getElementById('scrambled').textContent=scramble(current[0]).toUpperCase();document.getElementById('hint').textContent='Hint: '+current[1];document.getElementById('msg').textContent='';document.getElementById('inp').value='';}document.getElementById('inp').addEventListener('input',()=>{const v=document.getElementById('inp').value.toLowerCase().trim();if(v===current[0]){score++;streak++;document.getElementById('sc').textContent=score;document.getElementById('str').textContent=streak;document.getElementById('msg').textContent='✅ Correct!';document.getElementById('msg').style.color='#22aa44';setTimeout(next,600);}});function skip(){streak=0;document.getElementById('str').textContent=0;document.getElementById('msg').textContent='Answer: '+current[0];document.getElementById('msg').style.color='#e00';setTimeout(next,1000);}next();<\/script></body></html>`},
  {name:"Quiz",cat:"Trivia",emoji:"❓",code:`<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}#q{font-size:17px;font-weight:600;text-align:center;max-width:380px;margin-bottom:20px;line-height:1.5}#opts{display:flex;flex-direction:column;gap:8px;width:360px}#opts button{padding:12px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:14px}#opts button.correct{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}#opts button.wrong{background:#ffebee;border-color:#f44336;color:#c62828}#score{font-size:14px;color:#888;margin-bottom:16px}#next{padding:10px 24px;background:#5b5bd6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;display:none;margin-top:12px}</style></head><body><div id="score">Q <span id="qn">1</span>/10 | Score: <span id="sc">0</span></div><div id="q"></div><div id="opts"></div><button id="next" onclick="nextQ()">Next →</button><script>const qs=[{q:"Capital of Australia?",a:"Canberra",opts:["Sydney","Melbourne","Canberra","Brisbane"]},{q:"Sides on a hexagon?",a:"6",opts:["5","6","7","8"]},{q:"Planet closest to Sun?",a:"Mercury",opts:["Venus","Earth","Mercury","Mars"]},{q:"Who painted the Mona Lisa?",a:"Leonardo da Vinci",opts:["Michelangelo","Raphael","Leonardo da Vinci","Botticelli"]},{q:"Largest ocean?",a:"Pacific",opts:["Atlantic","Indian","Arctic","Pacific"]},{q:"Bones in human body?",a:"206",opts:["196","206","216","226"]},{q:"WW2 ended in?",a:"1945",opts:["1943","1944","1945","1946"]},{q:"Chemical symbol for gold?",a:"Au",opts:["Go","Gd","Au","Ag"]},{q:"Planets in solar system?",a:"8",opts:["7","8","9","10"]},{q:"Fastest land animal?",a:"Cheetah",opts:["Lion","Horse","Cheetah","Leopard"]}];let idx=0,score=0,answered=false;function show(){answered=false;const q=qs[idx];document.getElementById('q').textContent=q.q;document.getElementById('qn').textContent=idx+1;document.getElementById('next').style.display='none';const opts=document.getElementById('opts');opts.innerHTML='';[...q.opts].sort(()=>Math.random()-0.5).forEach(o=>{const b=document.createElement('button');b.textContent=o;b.onclick=()=>{if(answered)return;answered=true;if(o===q.a){b.classList.add('correct');score++;document.getElementById('sc').textContent=score;}else{b.classList.add('wrong');opts.querySelectorAll('button').forEach(bb=>{if(bb.textContent===q.a)bb.classList.add('correct');});}document.getElementById('next').style.display=idx<qs.length-1?'':'none';if(idx>=qs.length-1)setTimeout(()=>{document.getElementById('q').textContent='Done! Score: '+score+'/10';opts.innerHTML='';},500);};opts.appendChild(b);});}function nextQ(){idx++;show();}show();<\/script></body></html>`},

let activeGameCat="All";
function renderGameCats(){
  const cats=["All",...new Set(GAME_LIST.map(g=>g.cat))];
  const el=document.getElementById("game-cats");el.innerHTML="";
  cats.forEach(function(cat){
    const b=document.createElement("button");b.className="game-cat"+(cat===activeGameCat?" active":"");b.textContent=cat;
    b.onclick=function(){activeGameCat=cat;document.querySelectorAll(".game-cat").forEach(x=>x.classList.remove("active"));b.classList.add("active");filterGames(document.querySelector(".games-top .srch").value);};
    el.appendChild(b);
  });
}
function filterGames(q){
  q=(q||"").toLowerCase();
  const list=GAME_LIST.filter(function(g){return(activeGameCat==="All"||g.cat===activeGameCat)&&(g.name.toLowerCase().includes(q)||g.cat.toLowerCase().includes(q));});
  const grid=document.getElementById("games-grid");grid.innerHTML="";
  list.forEach(function(g){
    const d=document.createElement("div");d.className="game-card"+(g.featured?" featured":"");
    d.innerHTML='<div class="gc-icon">'+g.emoji+'</div><div class="gc-name">'+g.name+'</div><div class="gc-cat">'+(g.featured?"★ FEATURED · ":"")+g.cat+'</div>';
    d.onclick=function(){openGame(g);};grid.appendChild(d);
  });
  if(!list.length)grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:2rem;font-size:13px">No games found</div>';
}
function openGame(g){
  document.getElementById("gm-title").textContent=g.emoji+" "+g.name;
  document.getElementById("gframe").srcdoc=g.code;
  document.getElementById("gmbg").classList.add("open");
}
function closeGame(){document.getElementById("gmbg").classList.remove("open");document.getElementById("gframe").srcdoc="";}
document.getElementById("gmbg").addEventListener("click",function(e){if(e.target===document.getElementById("gmbg"))closeGame();});

// INIT
loadGame();
fetchCloudSounds().then(function(){renderSounds();});
renderBiz();renderUpgrades();renderInvestments();renderSpecial();
updateUI();addLog("Welcome to Money Empire! Click to earn!");
renderGameCats();filterGames("");
requestAnimationFrame(gameTick);
